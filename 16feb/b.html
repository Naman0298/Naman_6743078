<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Update Information</title>

    <style>
        body {
            font-family: Georgia, serif;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #f5f5f5;
            padding: 25px;
            width: 380px;
            border-radius: 6px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin: 0;
            font-weight: normal;
            color: #333;
        }

        p {
            font-size: 14px;
            color: #666;
        }

        label {
            display: inline-block;
            width: 140px;
            margin-top: 10px;
            font-size: 14px;
        }

        input[type=text],
        select {
            padding: 4px;
            width: 180px;
            margin-top: 8px;
        }

        .row {
            margin-bottom: 6px;
        }

        .btn {
            margin-top: 15px;
            float: right;
            padding: 6px 14px;
            border-radius: 12px;
            border: 1px solid #777;
            background: #eee;
            cursor: pointer;
        }

        .btn:hover {
            background: #ddd;
        }
    </style>

</head>

<body>

    <div class="card">

        <h1>Update Information</h1>
        <p>Use the form below to edit your information.</p>

        <form>

            <div class="row">
                <label>First name:</label>
                <input type="text">
            </div>

            <div class="row">
                <label>Last name:</label>
                <input type="text">
            </div>

            <div class="row">
                <label>Favorite sport:</label>
                <select>
                    <option>Cricket</option>
                    <option>Basketball</option>
                    <option>Football</option>
                    <option>Tennis</option>
                </select>
            </div>

            <div class="row">
                <label>Gender:</label>
                <input type="radio" name="gender"> Male
                <input type="radio" name="gender"> Female
                <input type="radio" name="gender"> Not sure
            </div>

            <div class="row">
                <label>State resident:</label>
                <select>
                    <option>Madhya Pradesh</option>
                    <option>Kerela</option>
                    <option>Rajasthan</option>
                    <option>Utar Pradesh</option>
                </select>
            </div>

            <div class="row">
                <label></label>
                <input type="checkbox"> 21 or older
            </div>

            <div class="row">
                <label>Car models owned:</label><br>
                <label></label>
                <input type="checkbox"> Ford
                <input type="checkbox"> Chrysler
                <input type="checkbox"> Toyota
                <input type="checkbox"> Nissan
            </div>

            <button class="btn">Save Changes</button>

        </form>

    </div>

</body>

</html>
