<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Application Form</title>

    <style>
        .form-container {
            width: 400px;
            margin: 50px auto;
            padding: 25px;
            border: 2px solid #999;
            background-color: #fff;
        }

        h2 {
            text-align: center;
            color: #b22222;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: inline-block;
            width: 100px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 250px;
            padding: 5px;
        }

        textarea {
            height: 60px;
            resize: none;
        }

        .gender-group {
            margin-left: 100px;
        }

        .submit-btn {
            display: block;
            margin: 20px auto 0;
            padding: 7px 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="form-container">

        <h2>User Application Form</h2>

        <form>

            <!-- First Name -->
            <div class="form-group">
                <label>First Name</label>
                <input type="text" name="fname">
            </div>

            <!-- Last Name -->
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" name="lname">
            </div>

            <!-- Gender -->
            <div class="form-group">
                <label>Gender</label>

                <span class="gender-group">
                    <input type="radio" name="gender" value="male"> Male
                    <input type="radio" name="gender" value="female"> Female
                </span>
            </div>

            <!-- Address -->
            <div class="form-group">
                <label>Address</label>
                <textarea name="address"></textarea>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email Id</label>
                <input type="email" name="email">
            </div>

            <!-- Submit -->
            <input type="submit" value="Submit" class="submit-btn">

        </form>

    </div>

</body>

</html>
